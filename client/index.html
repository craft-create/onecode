<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  >
  <title>光影工坊</title>
  <script>
    const platformTemplate = '{{{__platform__}}}';
    if (typeof platformTemplate === 'string' && platformTemplate.includes('{')) {
      try {
        const candidate = platformTemplate.trim();
        if (candidate !== '' && candidate !== '{{{__platform__}}}') {
          window.__platform__ = JSON.parse(candidate);
        }
      } catch (error) {
        console.error('Failed to parse __platform__', error);
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>

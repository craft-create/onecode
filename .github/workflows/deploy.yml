name: Deploy onecode

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          command_timeout: 20m
          debug: true
          script: |
            set -euo pipefail
            export DEPLOY_BRANCH=${{ github.ref_name }}
            export SUDO_PASSWORD="${{ secrets.DEPLOY_PASSWORD }}"
            export NPM_HTTP_PROXY="${{ secrets.NPM_HTTP_PROXY }}"
            echo "[action] host=${{ secrets.DEPLOY_HOST }} user=${{ secrets.DEPLOY_USER }} branch=${DEPLOY_BRANCH}"
            echo "[action] invoking deploy script..."
            /opt/onecode/scripts/deploy-remote.sh
